services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./eeg-triage
      args:
        VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
